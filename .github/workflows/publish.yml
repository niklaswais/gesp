name: publish

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME ($tag) does not match pyproject version $pkg" >&2
            exit 1
          fi
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
